name: Build MX65 PoE Firmware (Minimal + PoE + Chinese)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: ['.github/**', 'README.md']

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build:
    name: Build MX65 PoE Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout Leo-PL OpenWrt (meraki-mx65-poe branch)
        uses: actions/checkout@v4
        with:
          repository: Leo-PL/openwrt
          ref: meraki-mx65-poe
          fetch-depth: 1

      - name: Create swap space (prevent OOM, use dd for compatibility)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip \
            python3 python3-pip binutils bzip2 \
            diffutils findutils flex grep \
            libz-dev libstdc++-12-dev subversion \
            ninja-build ccache

      - name: Install CMake 3.31+
        run: |
          wget -q https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-x86_64.tar.gz
          sudo tar xf cmake-3.31.6-linux-x86_64.tar.gz -C /opt/
          sudo ln -sf /opt/cmake-3.31.6-linux-x86_64/bin/cmake /usr/local/bin/cmake
          sudo ln -sf /opt/cmake-3.31.6-linux-x86_64/bin/ctest /usr/local/bin/ctest
          cmake --version

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for MX65 (Minimal + PoE + Chinese)
        run: |
          make defconfig
          cat >> .config << 'EOF'
          # ===== Target =====
          CONFIG_TARGET_bcm53xx=y
          CONFIG_TARGET_bcm53xx_generic=y
          CONFIG_TARGET_bcm53xx_generic_DEVICE_meraki_mx65=y

          # ===== PoE Driver (Critical) =====
          CONFIG_PACKAGE_kmod-bcm59111-pse=y

          # ===== Core System (Minimal) =====
          CONFIG_PACKAGE_busybox=y
          CONFIG_PACKAGE_ubox=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_getrandom=y
          CONFIG_PACKAGE_rpcd=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_ucode=y

          # ===== LuCI (Minimal + Chinese) =====
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_LUCI_LANG_zh_Hans=y

          # ===== PoE Status Display =====
          CONFIG_PACKAGE_luci-app-poe=y

          # ===== Disable LTO (reduce RAM usage) =====
          # CONFIG_USE_LTO is not set

          # ===== Disable heavy packages (minimize size & RAM) =====
          CONFIG_PACKAGE_luci-app-firewall=n
          CONFIG_PACKAGE_luci-app-opkg=n
          CONFIG_PACKAGE_luci-app-sqm=n
          CONFIG_PACKAGE_luci-app-upnp=n
          CONFIG_PACKAGE_luci-app-ddns=n
          CONFIG_PACKAGE_luci-app-uhttpd=n
          CONFIG_PACKAGE_luci-app-statistics=n
          CONFIG_PACKAGE_collectd=n
          CONFIG_PACKAGE_collectd-mod-cpu=n
          CONFIG_PACKAGE_collectd-mod-memory=n
          CONFIG_PACKAGE_collectd-mod-interface=n
          CONFIG_PACKAGE_netdata=n
          CONFIG_PACKAGE_nginx=n
          CONFIG_PACKAGE_rpcd-mod-rrdns=n
          EOF

          # Auto-answer all interactive prompts with defaults
          yes "" | make oldconfig

          # Verify key packages are selected
          echo ">>> Config summary:"
          grep -E "CONFIG_PACKAGE_(kmod-bcm59111-pse|luci|rpcd|uhttpd)" .config || echo "Warning: Some key packages missing"

      - name: Build firmware (low parallelism to avoid OOM)
        run: |
          make -j2 V=s 2>&1 | tee build.log
          # Check for errors in the last 50 lines
          if tail -n 50 build.log | grep -q "Error"; then
            echo "Build failed!"
            exit 1
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mx65-poe-minimal-firmware
          path: |
            bin/targets/bcm53xx/generic/openwrt-bcm53xx-generic-meraki_mx65-squashfs-sysupgrade.bin
            bin/targets/bcm53xx/generic/openwrt-bcm53xx-generic-meraki_mx65-initramfs-kernel.bin
          retention-days: 30
          if-no-files-found: error
