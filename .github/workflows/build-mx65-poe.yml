name: Build MX65 PoE Firmware (Minimal + PoE + Chinese)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      # 强制使用 Node 24，消除警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout (你的仓库)
        uses: actions/checkout@v4
        with:
          repository: wuqing8301/mx65-poe-build  # 确保这里是你的仓库名
          ref: main
          fetch-depth: 1

      - name: Free up disk space (激进清理)
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache /usr/share/dotnet /var/lib/snapd
          sudo apt clean
          sudo apt autoremove -y
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex unzip \
            python3 python3-pip zlib1g-dev subversion git libncurses5-dev \
            libssl-dev libelf-dev bc ccache qemu-utils dwarves

      # 【关键修复 1】配置 Git 换源，防止 clone 超时
      - name: Configure Git & Clone OpenWrt
        run: |
          git config --global url."https://ghproxy.com/https://github.com/".insteadOf "https://github.com/"
          
          # 克隆官方源码（浅克隆，只拉最新版）
          git clone --depth=1 https://git.openwrt.org/openwrt/openwrt.git openwrt
          cd openwrt
          
          # 【关键修复 2】更新 feeds 时使用国内镜像（可选，如果网络好可省略）
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for MX65 (PoE + Chinese + Minimal)
        run: |
          cd openwrt
          
          # 生成默认配置
          make defconfig
          
          # 写入核心配置
          cat >> .config << 'EOF'
          CONFIG_TARGET_bcm53xx=y
          CONFIG_TARGET_bcm53xx_generic=y
          CONFIG_TARGET_bcm53xx_generic_DEVICE_meraki_mx65=y
          CONFIG_PACKAGE_kmod-bcm59111-pse=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_rpcd-mod-luci=y
          CONFIG_PACKAGE_luci-app-poe=y
          # 关闭高内存占用项
          CONFIG_PACKAGE_luci-app-firewall=n
          CONFIG_PACKAGE_luci-app-sqm=n
          CONFIG_PACKAGE_luci-app-upnp=n
          CONFIG_PACKAGE_collectd=n
          CONFIG_PACKAGE_netdata=n
          CONFIG_PACKAGE_nginx=n
          # 禁用 LTO，防止链接阶段 OOM
          # CONFIG_USE_LTO is not set
          EOF
          
          # 自动处理交互
          yes "" | make oldconfig

      # 【关键修复 3】改为单线程编译，保证成功率（虽然慢点但稳）
      - name: Build firmware (Safe Mode)
        run: |
          cd openwrt
          make clean
          # 使用 -j1 单线程，V=s 显示详细日志
          make -j1 V=s 2>&1 | tee build.log
          
          # 检查错误
          if tail -n 100 build.log | grep -q "Error"; then
            echo "❌ Build failed! Check build.log for details."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MX65-PoE-Minimal-Firmware
          path: openwrt/bin/targets/bcm53xx/generic/
          if-no-files-found: error
